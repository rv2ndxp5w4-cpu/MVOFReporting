<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MVOF Login</title>
  <style>
    :root {
      --bg:#e8e8e8;
      --panel:#ffffff;
      --line:#cfd8df;
      --ink:#0e2841;
      --muted:#3f5568;
      --accent:#156082;
      --accent2:#e97132;
    }
    * { box-sizing: border-box; }
    body {
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 20% 20%, rgba(15,158,213,0.2), transparent 40%),
        radial-gradient(circle at 80% 90%, rgba(233,113,50,0.17), transparent 42%),
        linear-gradient(180deg, #f8fbfd 0%, var(--bg) 100%);
      color:var(--ink);
      font-family:"Pilat Condensed", "Pilat", "Avenir Next", "Segoe UI", sans-serif;
    }
    .card {
      width:min(420px, 92vw);
      border:1px solid var(--line);
      background:var(--panel);
      border-radius:16px;
      padding:28px;
      box-shadow:0 12px 30px rgba(14,40,65,0.09);
    }
    h1 {
      margin:0 0 8px;
      font-size:1.45rem;
      letter-spacing:0.02em;
      text-transform:uppercase;
    }
    p { margin:0 0 18px; color:var(--muted); font-size:0.95rem; }
    input, button {
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--line);
      font:inherit;
    }
    button {
      margin-top:10px;
      background:var(--accent);
      color:white;
      border:none;
      cursor:pointer;
      font-weight:700;
    }
    button:hover { filter: brightness(0.98); }
    .hint { margin-top:10px; font-size:0.85rem; color:var(--muted); }
    code { color: var(--accent2); }
  </style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <h1>MVOF Reporting Dashboard</h1>
    <p>Password-protected view for portfolio traction, timeline, and clarification workflow.</p>
    <input type="password" name="password" placeholder="Password" required />
    <button type="submit">Enter</button>
    <div class="hint">Use your assigned access password.</div>
  </form>
</body>
</html>
